<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Loan Support Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
  <main class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-icon" aria-hidden="true">◆</div>
        <h1>Loan Support Assistant</h1>
        <p class="tagline">Sign in with your Microsoft account to access the loan assistant</p>
      </div>

      <div class="login-form">
        <p class="login-hint">Use your work or school Microsoft account to continue.</p>
        <button type="button" class="btn btn-primary btn-microsoft" id="btn-signin-ms" aria-label="Sign in with Microsoft">
          <span class="btn-icon" aria-hidden="true">M</span>
          Sign in with Microsoft
        </button>
        <p id="login-error" class="error-msg" role="alert"></p>
      </div>
    </div>
  </main>
  <script src="config.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.32.2/js/msal-browser.min.js"></script>
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
